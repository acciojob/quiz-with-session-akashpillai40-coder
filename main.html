<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="header-tag">KNOWLEDGE CHECK</div>
      <h1>Science &amp; Tech Quiz</h1>
      <p class="subtitle">5 questions · Select one answer per question</p>
    </header>

    <div id="questions"></div>

    <div class="actions">
      <button id="submit">Submit Quiz</button>
    </div>

    <div id="score"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
