<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quiz App</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    .question { margin-bottom: 24px; }
    .question p { font-weight: bold; margin-bottom: 8px; }
    label { display: block; margin-bottom: 6px; cursor: pointer; }
    button { padding: 10px 24px; font-size: 16px; cursor: pointer; margin-top: 16px; }
    #score { margin-top: 24px; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Quiz</h1>
  <div id="questions"></div>
  <button id="submit">Submit</button>
  <div id="score"></div>

  <script src="script.js"></script>
</body>
</html>
